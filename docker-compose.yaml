services:
  db:
    image: postgres:15-alpine
    container_name: hw10_postgres_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal_app_net

  app:
    build: .
    container_name: hw10_fastapi_app
    ports:
      - "8000:8000" 
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
    depends_on:
      - db
    networks:
      - internal_app_net

volumes:
  postgres_data:

networks:
  internal_app_net:
    driver: bridge